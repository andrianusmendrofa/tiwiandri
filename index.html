<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>PRATIWI SRI RAMADANI | PREDIKSI TOGEL | INVEST TWIN BERBEDA TIAP PASARAN</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at top, #0a0f1e, #03060c);
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
}

/* HEADER STICKY - TIDAK BERGERAK */
.TIWI-header {
    text-align: center;
    margin-bottom: 20px;
    position: sticky;
    top: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);
    z-index: 100;
    padding: 15px 20px;
    border-radius: 0 0 30px 30px;
    box-shadow: 0 5px 20px rgba(128, 0, 255, 0.3);
    overflow: visible;
}

.title-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.TIWI-title {
    font-size: 4em;
    font-weight: bold;
    background: linear-gradient(9deg, red, orange, yellow, lime, cyan, blue, violet);
    background-size: 300%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowMove 25s linear infinite, titleBlink 0.5s ease-in-out infinite alternate;
    display: inline-block;
    letter-spacing: 2px;
}

@keyframes rainbowMove {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
}

@keyframes titleBlink {
    0% { opacity: 0.7; text-shadow: 0 0 5px red; }
    100% { opacity: 1; text-shadow: 0 0 25px cyan; }
}

.butterfly {
    display: inline-block;
    font-size: 3rem;
    animation: fly 3s ease-in-out infinite;
    filter: drop-shadow(0 0 5px rgba(255,215,0,0.5));
}
.butterfly-left { animation-delay: 0s; }
.butterfly-right { animation-delay: 0.5s; transform: scaleX(-1); }

@keyframes fly {
    0% { transform: translateY(0px) rotate(0deg);}
    25% { transform: translateY(-15px) rotate(5deg);}
    50% { transform: translateY(5px) rotate(-3deg);}
    75% { transform: translateY(-8px) rotate(3deg);}
    100% { transform: translateY(0px) rotate(0deg);}
}

.subtitle { font-size: 18px; color: #ffd700; margin-top: 10px; text-shadow: 0 0 5px #ffaa00; letter-spacing: 2px; }

/* HEADER PREDIKSI - DIBUAT STICKY TIDAK BERGERAK */
.header-box {
    width: 100%;
    margin: 0 auto 30px auto;
    padding: 20px;
    border-radius: 40px;
    text-align: center;
    background: rgba(2, 6, 23, 0.7);
    backdrop-filter: blur(5px);
    box-shadow: 0 0 10px #00aaff;
    animation: glowPulse 2s infinite alternate;
    position: sticky;
    top: 95px;
    z-index: 99;
}
@keyframes glowPulse {
    0% { box-shadow: 0 0 10px #00aaff; }
    100% { box-shadow: 0 0 40px #66ffff; }
}
.rainbow-text {
    font-size: 32px;
    font-weight: bold;
    background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet);
    background-size: 300%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowMove 4s linear infinite;
}
.lights {
    position: absolute;
    top: -12px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 12px;
}
.lights span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    animation: blink 1.5s infinite alternate;
}
.lights span:nth-child(1) { background: red; }
.lights span:nth-child(2) { background: orange; animation-delay: 0.2s; }
.lights span:nth-child(3) { background: yellow; animation-delay: 0.4s; }
.lights span:nth-child(4) { background: lime; animation-delay: 0.6s; }
.lights span:nth-child(5) { background: cyan; animation-delay: 0.8s; }
.lights span:nth-child(6) { background: blue; animation-delay: 1s; }
.lights span:nth-child(7) { background: violet; animation-delay: 1.2s; }
@keyframes blink {
    0% { opacity: 0.3; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.6); }
}
.running-light {
    margin-top: 15px;
    height: 3px;
    width: 100%;
    background: linear-gradient(90deg, transparent, cyan, transparent);
    background-size: 200px;
    animation: moveLight 2s linear infinite;
}
@keyframes moveLight {
    0% { background-position: -200px; }
    100% { background-position: 200px; }
}

/* COUNTDOWN BAR */
.countdown-bar-wrap {
    background: linear-gradient(135deg, rgba(128, 0, 255, 0.35), rgba(156, 39, 176, 0.45));
    backdrop-filter: blur(8px);
    border-radius: 40px;
    padding: 12px 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 15px;
    border: 1px solid rgba(200, 130, 255, 0.6);
    flex-wrap: wrap;
}
.countdown-left-group {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
}
.countdown-right-group {
    display: flex;
    align-items: center;
    gap: 15px;
}
.menu-tools-btn {
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    border: none;
    color: white;
    font-weight: bold;
    padding: 8px 20px;
    border-radius: 40px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.2s;
    box-shadow: 0 0 8px rgba(139,92,246,0.5);
}
.menu-tools-btn:hover {
    transform: scale(1.02);
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
}
.shortcut-btn {
    background: linear-gradient(135deg, #ec489a, #be185d);
    border: none;
    color: white;
    font-weight: bold;
    padding: 8px 20px;
    border-radius: 40px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.2s;
    box-shadow: 0 0 8px rgba(236,72,154,0.5);
}
.shortcut-btn:hover {
    transform: scale(1.02);
    background: linear-gradient(135deg, #f472b6, #db2777);
}
.countdown-label {
    color: #ffffff;
    font-weight: 900;
    font-size: 1rem;
    text-shadow: 0 0 5px rgba(0,0,0,0.5);
}
.countdown-digits {
    display: flex;
    gap: 4px;
    align-items: center;
}
.cd-num {
    background: rgba(15, 23, 42, 0.8);
    border: 2px solid #fbbf24;
    color: #fde047;
    font-size: 1.5rem;
    font-weight: 900;
    width: 40px;
    height: 50px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
}
.cd-num.pulse {
    transform: scale(1.1);
    border-color: #ff4444;
    color: #ff6666;
}
.countdown-progress {
    width: 160px;
    height: 8px;
    background: rgba(15,23,42,0.8);
    border-radius: 10px;
    overflow: hidden;
}
.countdown-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #fbbf24, #f59e0b);
    border-radius: 10px;
    transition: width 1s linear;
}
.countdown-cycle {
    color: white;
    font-size: 0.85rem;
    font-weight: bold;
    text-shadow: 0 0 3px rgba(0,0,0,0.5);
}

/* CONTROL PANEL */
.control-panel {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
    justify-content: space-between;
    border: 1px solid rgba(251, 191, 36, 0.4);
}
.search-group { flex: 2; min-width: 220px; }
.search-group input {
    width: 100%;
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid #fbbf24;
    padding: 10px 20px;
    border-radius: 40px;
    color: white;
    font-size: 14px;
    outline: none;
}
.select-group { display: flex; align-items: center; gap: 15px; }
.select-group label { color: #fbbf24; font-weight: 600; }
select {
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid #fbbf24;
    padding: 10px 20px;
    border-radius: 40px;
    color: white;
    font-size: 14px;
    cursor: pointer;
    min-width: 220px;
}
.btn-group { display: flex; gap: 10px; }
button {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    border: none;
    padding: 10px 20px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 14px;
}
button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(251,191,36,0.4); }
.btn-all { background: linear-gradient(135deg, #3b82f6, #1e40af); color: white; }
.btn-show-all { background: linear-gradient(135deg, #10b981, #059669); color: white; }
.date-info {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(5px);
    padding: 8px 16px;
    border-radius: 40px;
    color: #fbbf24;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
}
.search-stats {
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    border-radius: 40px;
    padding: 8px 20px;
    margin-bottom: 20px;
    color: #ffffff;
    font-size: 0.85rem;
    text-align: center;
}
.search-stats span { color: #fbbf24; font-weight: bold; }

/* GRID & CARD PREDIKSI */
.markets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 20px;
}
.market-item {
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(2px);
    border-radius: 20px;
    border: 1px solid rgba(251, 191, 36, 0.5);
    overflow: hidden;
    transition: transform 0.2s;
}
.market-item:hover { transform: translateY(-3px); border-color: #fbbf24; }
.market-header {
    background: rgba(128, 0, 255, 0.7);
    padding: 12px 15px;
    border-bottom: 1px solid rgba(251, 191, 36, 0.4);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.market-name { color: #ffd700; font-weight: bold; font-size: 0.95rem; }
.market-content { padding: 12px 15px; }
.market-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 0.8rem;
    flex-wrap: wrap;
    gap: 5px;
}
.market-row-label { color: #ffffff; font-weight: 600; }
.market-row-value { color: #ffff88; font-weight: 700; word-break: break-word; text-align: right; max-width: 65%; }
.twin-highlight {
    background: rgba(251, 191, 36, 0.15);
    border-left: 3px solid #fbbf24;
    padding: 8px 10px;
    border-radius: 12px;
    margin-top: 8px;
}
.twin-text { font-weight: bold; color: #ffdd88; font-size: 1rem; }
.angka-dinamis { transition: color 0.3s; }
.angka-dinamis.fresh-glow { color: #ffff66; text-shadow: 0 0 8px rgba(251,191,36,0.6); }
.angka-fresh { animation: numberPop 0.5s ease-out; }
@keyframes numberPop {
    0% { transform: scale(0.7); opacity: 0; filter: blur(4px); }
    100% { transform: scale(1); opacity: 1; filter: blur(0); }
}
.change-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ef4444, #f59e0b);
    color: white;
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    margin-left: 8px;
    animation: badgePulse 1s ease infinite;
}
@keyframes badgePulse { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }
.single-card {
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(3px);
    border-radius: 28px;
    border: 1px solid #fbbf24;
    overflow: hidden;
}
.single-header {
    background: rgba(128, 0, 255, 0.7);
    padding: 20px;
    border-bottom: 1px solid #fbbf24;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
}
.single-header h2 { color: #ffd700; font-size: 1.5rem; }
.prediction-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 15px;
    padding: 20px;
}
.pred-item {
    background: rgba(0, 0, 0, 0.5);
    border-radius: 16px;
    padding: 15px;
    border-left: 3px solid #fbbf24;
}
.pred-label { color: #ffd700; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
.pred-value { color: #ffffff; font-size: 1.1rem; font-weight: bold; }
.number-badge {
    display: inline-block;
    background: rgba(30, 41, 59, 0.7);
    padding: 4px 10px;
    border-radius: 20px;
    margin: 3px;
    font-size: 0.85rem;
    color: #ffdd88;
}
.footer {
    text-align: center;
    margin-top: 30px;
    padding: 15px;
    color: #cccccc;
    border-top: 1px solid rgba(251, 191, 36, 0.2);
}
.change-flash-overlay {
    position: fixed;
    top:0;left:0;right:0;bottom:0;
    background: rgba(251,191,36,0.15);
    pointer-events: none;
    z-index: 9999;
    opacity:0;
    transition:0.15s;
}
.change-flash-overlay.active { opacity: 1; }
.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #22c55e;
    color: white;
    padding: 12px 24px;
    border-radius: 40px;
    font-weight: bold;
    z-index: 10001;
    animation: fadeInOut 2.5s ease forwards;
}
@keyframes fadeInOut {
    0% { opacity:0; transform:translateY(20px);}
    15%{ opacity:1; transform:translateY(0);}
    85%{ opacity:1;}
    100%{ opacity:0; transform:translateY(20px);}
}
.empty-search {
    text-align: center;
    padding: 50px;
    background: rgba(0,0,0,0.5);
    border-radius: 40px;
    color: #ffffff;
    border: 1px dashed #fbbf24;
}

/* HALAMAN STICKY NOTE */
.sticky-page {
    background: linear-gradient(135deg, #4c1d95, #6d28d9, #5b21b6);
    border-radius: 30px;
    padding: 35px;
    margin-top: 10px;
    border: 2px solid #fbbf24;
    min-height: 600px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.sticky-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 35px;
    flex-wrap: wrap;
    gap: 20px;
}
.sticky-header h2 {
    color: #fde047;
    font-size: 2rem;
    display: flex;
    align-items: center;
    gap: 12px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}
.back-to-prediksi {
    background: linear-gradient(135deg, #3b82f6, #1e40af);
    color: white;
    padding: 12px 28px;
    font-size: 1rem;
}
.add-note-form {
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(8px);
    border-radius: 28px;
    padding: 25px;
    margin-bottom: 35px;
    border: 1px solid rgba(251,191,36,0.5);
}
.add-note-form input, .add-note-form textarea {
    width: 100%;
    background: #fff7e0;
    border: 2px solid #fbbf24;
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 15px;
    font-size: 1rem;
    color: #2d1f0a;
    font-weight: 500;
}
.add-note-form textarea {
    min-height: 120px;
    resize: vertical;
}
.add-note-form button {
    background: #10b981;
    color: white;
    width: 100%;
    padding: 14px;
    font-size: 1rem;
}
.sticky-notes-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 25px;
    max-height: 600px;
    overflow-y: auto;
    padding-right: 15px;
}
.sticky-note-card {
    background: linear-gradient(135deg, #fef9e6, #fff7e0);
    border-radius: 24px;
    padding: 22px;
    border-left: 10px solid #fbbf24;
    position: relative;
    transition: 0.2s;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
.sticky-note-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}
.sticky-note-title {
    font-weight: bold;
    color: #5c3d1a;
    margin-bottom: 15px;
    font-size: 1.3rem;
    padding-right: 100px;
    border-bottom: 2px dashed #fbbf24;
    padding-bottom: 10px;
}
.sticky-note-preview {
    color: #4a3620;
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 15px;
    min-height: 50px;
}
.sticky-note-date {
    font-size: 0.75rem;
    color: #8b7355;
    margin-top: 12px;
    font-style: italic;
}
.note-actions {
    position: absolute;
    top: 15px;
    right: 15px;
    display: flex;
    gap: 8px;
}
.edit-note-btn, .copy-note-btn {
    background: #8b5cf6;
    color: white;
    border: none;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
}
.edit-note-btn:hover, .copy-note-btn:hover {
    transform: scale(1.1);
}
.edit-note-btn { background: #f59e0b; }
.copy-note-btn { background: #3b82f6; }
.delete-note-btn {
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.delete-note-btn:hover {
    background: #dc2626;
    transform: scale(1.1);
}
.empty-notes {
    text-align: center;
    padding: 60px;
    color: #fde047;
    font-size: 1.2rem;
    font-style: italic;
    background: rgba(0,0,0,0.3);
    border-radius: 30px;
}

/* HALAMAN SHORTCUT - KHUSUS TABEL */
.shortcut-page {
    background: linear-gradient(135deg, #1e1b4b, #2d1b69, #4c1d95);
    border-radius: 30px;
    padding: 35px;
    margin-top: 10px;
    border: 2px solid #ec489a;
    min-height: 600px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.shortcut-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 35px;
    flex-wrap: wrap;
    gap: 20px;
}
.shortcut-header h2 {
    color: #fbcfe8;
    font-size: 2rem;
    display: flex;
    align-items: center;
    gap: 12px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}
.shortcut-divider {
    height: 2px;
    background: linear-gradient(90deg, #ec489a, #fbbf24, #ec489a);
    margin: 25px 0;
    border-radius: 10px;
}
.shortcut-section-title {
    color: #fbcfe8;
    font-size: 1.2rem;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* TABEL DATA dengan tempel data di sebelah aksi */
.data-table-wrapper {
    background: rgba(0, 0, 0, 0.5);
    border-radius: 24px;
    padding: 20px;
    margin-top: 15px;
    overflow-x: auto;
}
.data-table {
    width: 100%;
    border-collapse: collapse;
    color: #f3f4f6;
}
.data-table th {
    background: linear-gradient(135deg, #ec489a, #be185d);
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 1rem;
    color: white;
    border: 1px solid rgba(251,191,36,0.3);
}
.data-table td {
    padding: 12px;
    text-align: center;
    border: 1px solid rgba(251,191,36,0.2);
    background: rgba(0, 0, 0, 0.3);
}
.data-table tr:hover td {
    background: rgba(236,72,154,0.2);
}
.edit-data-btn {
    background: #f59e0b;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.75rem;
}
.edit-data-btn:hover {
    background: #d97706;
}
.delete-data-btn {
    background: #ef4444;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.75rem;
    margin-left: 5px;
}
.delete-data-btn:hover {
    background: #dc2626;
}
.tempel-cell {
    background: rgba(16, 185, 129, 0.2);
}
.tempel-input {
    width: 100%;
    background: #fff7e0;
    border: 2px solid #fbbf24;
    border-radius: 40px;
    padding: 8px 12px;
    font-size: 0.8rem;
    color: #2d1f0a;
}
.tempel-input::placeholder {
    color: #999;
    font-size: 0.7rem;
}
.tempel-actions {
    display: flex;
    gap: 8px;
    justify-content: center;
}
.tempel-btn-small {
    background: linear-gradient(135deg, #10b981, #059669);

<script>
// ========== DATA PASARAN & FUNGSI PREDIKSI ==========
const PASARAN = [
    "TOTOMACAU PAGI", "KENTUCKY MIDDAY", "FLORIDA MIDDAY", "HUAHIN 0100", "NEW YORK MIDDAY",
    "BANGKOK 0130", "CAROLINA DAY", "BRUNEI 02", "OREGON03", "OREGON06", "CALIFORNIA", "FLORIDA EVENING",
    "OREGON09", "NEW YORK EVENING", "BANGKOK 0930", "KENTUCKY EVENING", "CAROLINA EVENING", "CHELSEA11",
    "TOTOCAMBODIA", "OREGON12", "BULLSEYE", "POIPET12", "TOTOMACAU SIANG", "JAKARTA4D I", "SYDNEY",
    "BRUNEI 14", "CHELSEA15", "TOTOMACAU 5D SORE", "POIPET15", "TOTOMACAU SORE", "HUAHIN 1630",
    "KING KONG 4D I", "SINGAPORE", "MAGNUM4D", "CHELSEA19", "TOTOMACAU MALAM I", "POIPET19", "PCSO",
    "KING KONG 4D II", "HUAHIN 2100", "CHELSEA21", "TOTOMACAU 5D MALAM", "NEVADA", "BRUNEI 21",
    "TOTOMACAU MALAM II", "POIPET22", "HONGKONG", "JAKARTA4D II", "TOTOMACAU MALAM III", "TOTOMALI 1530",
    "TOTOMALI 2030", "TOTOMALI 2330", "HOKI DRAW"
];
const SHIO = ["TIKUS","KERBAU","MACAN","KELINCI","NAGA","ULAR","KUDA","KAMBING","MONYET","AYAM","ANJING","BABI"];
function getSlotSeed() { return Math.floor(Date.now() / 30000); }
function seededRNG(seed, offset, max) { const v = ((seed + offset) * 9301 + 49297) % 233280; return Math.floor(v / 233280 * max); }
function hashPasaran(pasaran) { let hash=0; for(let i=0;i<pasaran.length;i++) { hash = ((hash<<5)-hash)+pasaran.charCodeAt(i); hash=hash&hash; } return Math.abs(hash); }
const ALL_TWIN_DIGITS = ['00','11','22','33','44','55','66','77','88','99'];
function generateAllTwinCombinations() { let combos=[]; for(let i=0;i<ALL_TWIN_DIGITS.length;i++) for(let j=i+1;j<ALL_TWIN_DIGITS.length;j++) for(let k=j+1;k<ALL_TWIN_DIGITS.length;k++) combos.push([ALL_TWIN_DIGITS[i], ALL_TWIN_DIGITS[j], ALL_TWIN_DIGITS[k]]); return combos; }
function shuffleWithSeed(arr, seed) { let a=arr.slice(); for(let i=a.length-1;i>0;i--) { const j=seededRNG(seed,i*7+99999,i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }
let cachedTwinMap={}, cachedTwinSeed=-1;
function getUniqueTwinForIndex(idx) {
    const seed=getSlotSeed();
    if(seed!==cachedTwinSeed) {
        cachedTwinSeed=seed;
        const combos=generateAllTwinCombinations();
        const shuffled=shuffleWithSeed(combos,seed);
        cachedTwinMap={};
        for(let i=0;i<PASARAN.length;i++) { const combo=shuffled[i%shuffled.length]; const innerShuffled=shuffleWithSeed(combo,seed+i*777); cachedTwinMap[i]=innerShuffled.join('/'); }
    }
    return cachedTwinMap[idx]||'00/11/22';
}
function getPrediksi(pasaran) {
    const idx=PASARAN.indexOf(pasaran);
    const seed=getSlotSeed();
    const channel=idx*9973;
    const hash=hashPasaran(pasaran);
    const base=seed+channel+hash;
    function rng(off,max){return seededRNG(base,off,max);}
    let bbfsDigits=[], used={};
    for(let i=0;i<15;i++){let d=rng(i*7+100,10);if(!used[d]){used[d]=true;bbfsDigits.push(d);}if(bbfsDigits.length>=7)break;}
    while(bbfsDigits.length<7){let d=rng(9000+bbfsDigits.length*3,10);if(!used[d]){used[d]=true;bbfsDigits.push(d);}}
    for(let i=bbfsDigits.length-1;i>0;i--){const j=rng(5000+i*13,i+1);[bbfsDigits[i],bbfsDigits[j]]=[bbfsDigits[j],bbfsDigits[i]];}
    const bbfs=bbfsDigits.join('');
    let mainSet=new Set(); for(let i=0;i<25;i++) mainSet.add(rng(i*4+500,10));
    let mainArr=Array.from(mainSet).slice(0,5); while(mainArr.length<5) mainArr.push(rng(mainArr.length+800,10));
    const angkaMain=mainArr.join('');
    let fourD=[]; for(let i=0;i<4;i++) fourD.push(rng(1000+i*11,10)+''+rng(1001+i*11,10)+''+rng(1002+i*11,10)+''+rng(1003+i*11,10));
    let threeD=[]; for(let i=0;i<4;i++) threeD.push(rng(1500+i*13,10)+''+rng(1501+i*13,10)+''+rng(1502+i*13,10));
    let twoD=[]; for(let i=0;i<10;i++) twoD.push(rng(2000+i*17,10)+''+rng(2001+i*17,10));
    const colok=rng(3000,10)+'/'+rng(3001,10);
    const colok2d=rng(3500,10)+''+rng(3501,10)+'/'+rng(3502,10)+''+rng(3503,10)+'/'+rng(3504,10)+''+rng(3505,10);
    let s1=rng(4000,12), s2=(s1+rng(4001,11)+1)%12, s3=(s2+rng(4002,10)+1)%12;
    const shio=SHIO[s1]+'/'+SHIO[s2]+'/'+SHIO[s3];
    const twin=getUniqueTwinForIndex(idx);
    let isKhusus=false, angka5d=null;
    if(pasaran==="TOTOMACAU 5D SORE" || pasaran==="TOTOMACAU 5D MALAM") { isKhusus=true; angka5d=[ rng(7000,10)+''+rng(7001,10)+''+rng(7002,10)+''+rng(7003,10)+''+rng(7004,10), rng(8000,10)+''+rng(8001,10)+''+rng(8002,10)+''+rng(8003,10)+''+rng(8004,10) ]; }
    return { bbfs, angkaMain, fourD, threeD, twoD, colok, colok2d, shio, twin, angka5d, isKhusus };
}
function getTanggal(){const d=new Date();return ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'][d.getDay()]+', '+d.getDate()+' '+['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'][d.getMonth()]+' '+d.getFullYear();}
function formatTeks(pasaran){const p=getPrediksi(pasaran);let txt=`Prediksi ${pasaran}\nHari ${getTanggal()}\nBBFS KUAT: ${p.bbfs}\nAngka Main : ${p.angkaMain}`; if(p.isKhusus&&p.angka5d) txt+=`\n5D  : ${p.angka5d.join(' ')}`; txt+=`\n4D (BB): ${p.fourD.join(' ')}\n3D (BB) : ${p.threeD.join(' ')}\n2D (BB): ${p.twoD.join(' ')}\nColok Bebas : ${p.colok}\nColok bebas 2D : ${p.colok2d}\nColok Shio : ${p.shio}\nInvest Twin : ${p.twin}\nBiasakan UPS - UTAMAKAN PREDIKSI SENDIRI`; return txt;}
function toast(msg){let t=document.querySelector('.toast');if(t)t.remove();t=document.createElement('div');t.className='toast';t.innerHTML=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
async function copyText(text,msg){try{await navigator.clipboard.writeText(text);toast('✅ '+msg);}catch(e){let ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✅ '+msg);}}

// RENDER PREDIKSI
let lastSlotSeed=getSlotSeed(), cycleCount=1, currentView='all', currentSearchKeyword='', currentSingleMarket=null;
let isOnStickyPage = false;
let isOnShortcutPage = false;

function triggerChangeFlash(){document.getElementById('changeFlash').classList.add('active');setTimeout(()=>document.getElementById('changeFlash').classList.remove('active'),300);}
function updateCountdown(){const now=new Date(); const sec=now.getSeconds()%30; const left=30-sec; const ss=left.toString().padStart(2,'0'); document.getElementById('cdSec1').textContent=ss[0]; document.getElementById('cdSec2').textContent=ss[1]; const progress=((30-left)/30)*100; document.getElementById('cdProgress').style.width=progress+'%'; if(left<=5){document.getElementById('cdSec1').classList.add('pulse');document.getElementById('cdSec2').classList.add('pulse');}else{document.getElementById('cdSec1').classList.remove('pulse');document.getElementById('cdSec2').classList.remove('pulse');} const currentSeed=getSlotSeed(); if(currentSeed!==lastSlotSeed && !isOnStickyPage && !isOnShortcutPage){lastSlotSeed=currentSeed;cycleCount++;triggerChangeFlash();refreshCurrentView();} document.getElementById('cdCycleInfo').textContent='Siklus #'+cycleCount;}
function refreshCurrentView(){ if(!isOnStickyPage && !isOnShortcutPage){ if(currentView==='all') tampilkanSemua(true); else if(currentView==='single' && currentSingleMarket) tampilkanSingle(currentSingleMarket,true); else if(currentView==='multi') cariPasaranForce(currentSearchKeyword,true); } }
function tampilkanSemua(isRefresh){ if(isOnStickyPage || isOnShortcutPage) return; currentView='all'; document.getElementById('searchStats').style.display='block'; document.getElementById('searchStats').innerHTML=`📊 Menampilkan <span>${PASARAN.length}</span> Pasaran ${isRefresh?'<span class="change-badge">BARU!</span>':''}| SETIAP PASARAN INVEST TWIN UNIK`; let html='<div class="markets-grid">'; for(let m of PASARAN){ const p=getPrediksi(m); const glow=isRefresh?' fresh-glow':''; const fiveRow=(p.isKhusus&&p.angka5d)?`<div class="market-row"><span class="market-row-label">5D:</span><span class="market-row-value angka-dinamis${glow}">${p.angka5d[0]} ${p.angka5d[1]}</span></div>`:''; html+=`<div class="market-item ${isRefresh?'angka-fresh':''}"><div class="market-header"><span class="market-name">🎲 ${m}</span><button class="copy-btn" data-market="${m.replace(/'/g,"\\'")}">📋 Copy</button></div><div class="market-content"><div class="market-row"><span class="market-row-label">BBFS KUAT:</span><span class="market-row-value angka-dinamis${glow}">${p.bbfs}</span></div><div class="market-row"><span class="market-row-label">Angka Main:</span><span class="market-row-value angka-dinamis${glow}">${p.angkaMain}</span></div>${fiveRow}<div class="market-row"><span class="market-row-label">4D (BB):</span><span class="market-row-value angka-dinamis${glow}">${p.fourD.join(' ')}</span></div><div class="twin-highlight"><span class="market-row-label">🔮 Invest Twin :</span><span class="twin-text angka-dinamis${glow}">${p.twin}</span></div></div></div>`; } html+='</div>'; document.getElementById('contentArea').innerHTML=html; document.querySelectorAll('.copy-btn').forEach(btn=>btn.onclick=e=>copyText(formatTeks(btn.getAttribute('data-market')),'Prediksi '+btn.getAttribute('data-market')+' disalin!')); }
function tampilkanSingle(market,isRefresh){ if(isOnStickyPage || isOnShortcutPage) return; currentView='single'; currentSingleMarket=market; document.getElementById('searchStats').style.display='none'; const p=getPrediksi(market); const glow=isRefresh?' fresh-glow':''; const badge=isRefresh?'<span class="change-badge">ANGKA BARU!</span>':''; document.getElementById('contentArea').innerHTML=`<div class="single-card"><div class="single-header"><div><h2>🎯 ${market} ${badge}</h2><div>📅 ${getTanggal()}</div></div><button id="copySingleBtn">📋 COPY PREDIKSI</button></div><div class="prediction-grid"><div class="pred-item"><div class="pred-label">BBFS KUAT</div><div class="pred-value angka-dinamis${glow}">${p.bbfs}</div></div><div class="pred-item"><div class="pred-label">Angka Main</div><div class="pred-value angka-dinamis${glow}">${p.angkaMain}</div></div><div class="pred-item"><div class="pred-label">4D (BB)</div><div class="pred-value angka-dinamis${glow}">${p.fourD.join(' · ')}</div></div><div class="pred-item"><div class="pred-label">Invest Twin</div><div class="pred-value" style="font-size:1.3rem;">${p.twin}</div></div></div></div>`; document.getElementById('copySingleBtn').onclick=()=>copyText(formatTeks(market),'Prediksi '+market+' disalin!'); }
function cariPasaranForce(keyword,isRefresh){ if(isOnStickyPage || isOnShortcutPage) return; const hasil=PASARAN.filter(p=>p.toLowerCase().includes(keyword.toLowerCase())); if(hasil.length===0){ document.getElementById('searchStats').style.display='block'; document.getElementById('searchStats').innerHTML=`🔍 <span>0</span> pasaran ditemukan.`; document.getElementById('contentArea').innerHTML='<div class="empty-search">😢 Tidak ada pasaran yang cocok</div>'; return; } if(hasil.length===1) tampilkanSingle(hasil[0],isRefresh); else { currentView='multi'; currentSearchKeyword=keyword; document.getElementById('searchStats').style.display='block'; document.getElementById('searchStats').innerHTML=`🔍 Menampilkan <span>${hasil.length}</span> pasaran`; let html='<div class="markets-grid">'; for(let m of hasil){ const p=getPrediksi(m); html+=`<div class="market-item"><div class="market-header"><span>🎲 ${m}</span><button class="copy-result-btn" data-market="${m.replace(/'/g,"\\'")}">📋 Copy</button></div><div class="market-content"><div class="market-row"><span>BBFS:</span><span>${p.bbfs}</span></div><div class="market-row"><span>Main:</span><span>${p.angkaMain}</span></div><div class="twin-highlight">🔮 Twin: ${p.twin}</div></div></div>`; } html+='</div>'; document.getElementById('contentArea').innerHTML=html; document.querySelectorAll('.copy-result-btn').forEach(btn=>btn.onclick=e=>copyText(formatTeks(btn.getAttribute('data-market')),'Prediksi disalin!')); } }

// ========== STICKY NOTE MANAGER ==========
let stickyNotes = [];
function loadStickyNotes() {
    const saved = localStorage.getItem('multi_sticky_notes');
    if(saved) { try { stickyNotes = JSON.parse(saved); } catch(e) { stickyNotes = []; } }
    if(!stickyNotes.length) {
        stickyNotes = [{
            id: Date.now(),
            title: "Selamat Datang di Sticky Note!",
            content: "Gunakan sticky note untuk mencatat:\n\n• Angka prediksi favorit\n• Rumus pribadi\n• Hasil analisis\n• Catatan penting lainnya\n\n💡 Klik ✏️ untuk edit, 📋 untuk copy isi catatan",
            date: new Date().toLocaleString()
        }];
        saveStickyNotes();
    }
}
function saveStickyNotes() { localStorage.setItem('multi_sticky_notes', JSON.stringify(stickyNotes)); }
function addStickyNote(title, content) {
    stickyNotes.unshift({ id: Date.now(), title: title.trim() || "Catatan", content: content.trim() || "-", date: new Date().toLocaleString() });
    saveStickyNotes();
    renderStickyPage();
    toast("📝 Catatan ditambahkan!");
}
function updateStickyNote(id, newTitle, newContent) {
    const index = stickyNotes.findIndex(n => n.id === id);
    if(index !== -1) {
        stickyNotes[index].title = newTitle.trim() || "Catatan";
        stickyNotes[index].content = newContent.trim() || "-";
        stickyNotes[index].date = new Date().toLocaleString() + " (diedit)";
        saveStickyNotes();
        renderStickyPage();
        toast("✏️ Catatan berhasil diupdate!");
    }
}
function deleteStickyNote(id) {
    stickyNotes = stickyNotes.filter(n => n.id != id);
    saveStickyNotes();
    renderStickyPage();
    toast("🗑️ Catatan dihapus");
}
function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// MODAL HANDLER STICKY NOTE
const modal = document.getElementById('noteModal');
const modalTitleElem = document.getElementById('modalTitle');
const modalBodyElem = document.getElementById('modalBody');
const modalHeaderActions = document.getElementById('modalHeaderActions');
function closeModal() { modal.style.display = 'none'; }

function showNoteDetail(note) {
    modalTitleElem.innerText = '📄 Detail Catatan';
    modalHeaderActions.innerHTML = `
        <span class="modal-header-date">📅 ${escapeHtml(note.date)}</span>
        <button class="modal-action-btn copy" id="copyFromDetailBtn">📋 Salin Isi Catatan</button>
        <button class="modal-action-btn edit" id="editFromDetailBtn">✏️ Edit Catatan</button>
    `;
    modalBodyElem.innerHTML = `
        <div class="detail-title">📌 ${escapeHtml(note.title)}</div>
        <div class="detail-content">${escapeHtml(note.content).replace(/\n/g, '<br>')}</div>
    `;
    modal.style.display = 'flex';
    document.getElementById('copyFromDetailBtn').onclick = () => { copyText(note.content, 'Isi catatan disalin!'); };
    document.getElementById('editFromDetailBtn').onclick = () => { closeModal(); showEditModal(note); };
}

function showEditModal(note) {
    modalTitleElem.innerText = '✏️ Edit Catatan';
    modalHeaderActions.innerHTML = `<span class="modal-header-date">📅 ${escapeHtml(note.date)}</span>`;
    modalBodyElem.innerHTML = `
        <input type="text" id="editTitle" class="modal-edit-input" value="${escapeHtml(note.title)}" placeholder="Judul">
        <textarea id="editContent" class="modal-edit-textarea" placeholder="Isi catatan...">${escapeHtml(note.content)}</textarea>
        <button id="saveEditBtn" class="save-edit-btn">💾 Simpan Perubahan</button>
    `;
    modal.style.display = 'flex';
    document.getElementById('saveEditBtn').onclick = () => {
        const newTitle = document.getElementById('editTitle').value;
        const newContent = document.getElementById('editContent').value;
        if(!newTitle.trim() && !newContent.trim()) { toast("Isi judul atau konten!"); return; }
        updateStickyNote(note.id, newTitle, newContent);
        closeModal();
    };
}

// HALAMAN STICKY NOTE
function renderStickyPage() {
    isOnStickyPage = true;
    isOnShortcutPage = false;
    loadStickyNotes();
    document.getElementById('searchStats').style.display = 'none';
    let html = `
        <div class="sticky-page">
            <div class="sticky-header">
                <h2>📝 STICKY NOTE</h2>
                <button id="backToPrediksiBtn" class="back-to-prediksi">◀ Kembali ke Prediksi</button>
            </div>
            <div class="add-note-form">
                <input type="text" id="newNoteTitle" placeholder="Judul catatan...">
                <textarea id="newNoteContent" rows="3" placeholder="Isi catatan..."></textarea>
                <button id="addNoteBtn">➕ Tambah Catatan Baru</button>
            </div>
            <div class="sticky-notes-container" id="stickyNotesList">
    `;
    if(stickyNotes.length === 0) {
        html += `<div class="empty-notes">📭 Belum ada catatan. Buat catatan baru di atas!</div>`;
    } else {
        stickyNotes.forEach(note => {
            let preview = note.content.replace(/\n/g, ' ').substring(0, 80);
            if(preview.length < note.content.length) preview += '...';
            html += `
                <div class="sticky-note-card" data-id="${note.id}">
                    <div class="sticky-note-title">📌 ${escapeHtml(note.title)}</div>
                    <div class="sticky-note-preview">${escapeHtml(preview)}</div>
                    <div class="sticky-note-date">📅 ${note.date}</div>
                    <div class="note-actions">
                        <button class="copy-note-btn" data-id="${note.id}" title="Salin isi catatan">📋</button>
                        <button class="edit-note-btn" data-id="${note.id}" title="Edit catatan">✏️</button>
                        <button class="delete-note-btn" data-id="${note.id}" title="Hapus catatan">✖</button>
                    </div>
                </div>
            `;
        });
    }
    html += `</div></div>`;
    document.getElementById('contentArea').innerHTML = html;
    
    document.getElementById('backToPrediksiBtn').onclick = () => { isOnStickyPage = false; isOnShortcutPage = false; tampilkanSemua(false); };
    document.getElementById('addNoteBtn').onclick = () => {
        const title = document.getElementById('newNoteTitle').value;
        const content = document.getElementById('newNoteContent').value;
        if(!title.trim() && !content.trim()) { toast("⚠️ Isi judul atau konten terlebih dahulu!"); return; }
        addStickyNote(title, content);
        document.getElementById('newNoteTitle').value = '';
        document.getElementById('newNoteContent').value = '';
    };
    document.querySelectorAll('.sticky-note-card').forEach(card => {
        const id = parseInt(card.getAttribute('data-id'));
        const note = stickyNotes.find(n => n.id === id);
        if(note) {
            card.querySelector('.copy-note-btn').onclick = (e) => { e.stopPropagation(); copyText(note.content, 'Isi catatan disalin!'); };
            card.querySelector('.edit-note-btn').onclick = (e) => { e.stopPropagation(); showEditModal(note); };
            card.querySelector('.delete-note-btn').onclick = (e) => { e.stopPropagation(); deleteStickyNote(id); };
            card.onclick = () => showNoteDetail(note);
        }
    });
}

// ========== DATA BANK (STORAGE) ==========
let dataBank = [];

function loadDataBank() {
    const saved = localStorage.getItem('data_bank_togel');
    if(saved) {
        try { dataBank = JSON.parse(saved); } catch(e) { dataBank = []; }
    }
    if(!dataBank.length) {
        dataBank = [
            { bank: "BCA", id: "001", nama: "Budi Santoso", norek: "1234567890" },
            { bank: "Mandiri", id: "002", nama: "Siti Aminah", norek: "9876543210" },
            { bank: "BRI", id: "003", nama: "Joko Widodo", norek: "5551234567" },
            { bank: "BNI", id: "004", nama: "Dewi Sartika", norek: "4449876543" },
            { bank: "CIMB Niaga", id: "005", nama: "Rudi Hartono", norek: "7778889990" }
        ];
        saveDataBank();
    }
}
function saveDataBank() {
    localStorage.setItem('data_bank_togel', JSON.stringify(dataBank));
}
function addDataBank(bank, id, nama, norek) {
    dataBank.push({ bank: bank.trim(), id: id.trim(), nama: nama.trim(), norek: norek.trim() });
    saveDataBank();
    renderShortcutPage();
    toast("✅ Data berhasil ditambahkan!");
}
function updateDataBank(index, bank, id, nama, norek) {
    if(index >= 0 && index < dataBank.length) {
        dataBank[index] = { bank: bank.trim(), id: id.trim(), nama: nama.trim(), norek: norek.trim() };
        saveDataBank();
        renderShortcutPage();
        toast("✏️ Data berhasil diupdate!");
    }
}
function deleteDataBank(index) {
    dataBank.splice(index, 1);
    saveDataBank();
    renderShortcutPage();
    toast("🗑️ Data dihapus!");
}
function prosesTempelData(rawText) {
    const lines = rawText.split(/\r?\n/);
    let added = 0;
    for(let line of lines) {
        line = line.trim();
        if(line === "") continue;
        let parts = line.split(/[,\t]+/);
        if(parts.length >= 4) {
            let bank = parts[0].trim();
            let id = parts[1].trim();
            let nama = parts[2].trim();
            let norek = parts[3].trim();
            if(bank && id && nama && norek) {
                dataBank.push({ bank, id, nama, norek });
                added++;
            }
        }
    }
    if(added > 0) {
        saveDataBank();
        renderShortcutPage();
        toast(`✅ Berhasil menambahkan ${added} data baru!`);
    } else {
        toast("⚠️ Tidak ada data valid. Format: Bank,ID,Nama,No Rek");
    }
}

// ========== HALAMAN SHORTCUT (DATA ADMIN) ==========
function renderShortcutPage() {
    isOnShortcutPage = true;
    isOnStickyPage = false;
    loadDataBank();
    document.getElementById('searchStats').style.display = 'none';
    
    let tableRows = '';
    dataBank.forEach((item, idx) => {
        tableRows += `
            <tr>
                <td>${escapeHtml(item.bank)}</td>
                <td>${escapeHtml(item.id)}</td>
                <td>${escapeHtml(item.nama)}</td>
                <td>${escapeHtml(item.norek)}</td>

                 </td>

        `;

    let savedTempelValue = localStorage.getItem('tempel_input_value') || '';
    
    // Baris untuk tempel data (sebagai baris terakhir)
    let tempelRow = `
        <tr class="tempel-cell">
            <td colspan="4">
                <input type="text" id="tempelInput" class="tempel-input" placeholder="Tempel data: Bank,ID,Nama,No Rek (pisah koma) - bisa banyak baris sekaligus" value="${escapeHtml(savedTempelValue)}">
            </td>
            <td>
                <div class="tempel-actions">
                    <button id="tempelBtn" class="tempel-btn-small">📋 TEMPEL +</button>
                    <button id="resetInputBtn" class="reset-input-btn">🗑️ Reset Input</button>
                </div>
            </td>
        </tr>
    `;
    
    let html = `
        <div class="shortcut-page">
            <div class="shortcut-header">
                <h2>📋 DATA BANK & REKENING</h2>
                <button id="backToPrediksiFromShortcut" class="back-to-prediksi">◀ Kembali ke Prediksi</button>
            </div>
            
            <div class="shortcut-divider"></div>
            
            <div class="shortcut-section-title">
                <span>🏦</span> DAFTAR REKENING
            </div>
            
            <div class="data-table-wrapper">
                <div style="margin-bottom: 15px; color: #fbcfe8; font-size: 0.85rem;">Total Data: ${dataBank.length}</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>BANK</th>
                            <th>ID</th>
                            <th>NAMA</th>
                            <th>NO REK</th>
                            <th>AKSI</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows || '<tr><td colspan="5" style="text-align:center;">Belum ada data. Tempel data di baris bawah!</td></tr>'}
                        ${tempelRow}
                    </tbody>
                </table>
            </div>
            
            <div class="shortcut-divider"></div>
            
            <div class="shortcut-section-title">
                <span>📌</span> CARA TEMPEL DATA
            </div>
            <div style="background:rgba(0,0,0,0.3); border-radius:20px; padding:20px; margin-top:15px;">
                <p style="color:#d8b4fe; line-height:1.6;">• Masukkan data di kolom <strong style="color:#fbbf24">"TEMPEL DATA"</strong> pada baris paling bawah tabel<br>
                • Format data: <strong style="color:#fbbf24">Bank,ID,Nama,No Rek</strong> (pisahkan dengan koma)<br>
                • Contoh: <strong style="color:#fbbf24">BCA,001,Budi Santoso,1234567890</strong><br>
                • Bisa tempel banyak data sekaligus (setiap baris satu data)<br>
                • Klik tombol <strong style="color:#fbbf24">"TEMPEL +"</strong> untuk langsung menambahkan ke tabel<br>
                • Data yang sudah ditambahkan akan <strong style="color:#fbbf24">TETAP TERSIMPAN</strong> meskipun halaman di-refresh<br>
                • Gunakan tombol <strong style="color:#fbbf24">"Reset Input"</strong> untuk mengosongkan kolom tempel</p>
            </div>
        </div>
    `;
    
    document.getElementById('contentArea').innerHTML = html;
    
    document.getElementById('backToPrediksiFromShortcut').onclick = () => {
        isOnShortcutPage = false;
        isOnStickyPage = false;
        tampilkanSemua(false);
    };
    
    // Event untuk tombol tempel
    const tempelBtn = document.getElementById('tempelBtn');
    const tempelInput = document.getElementById('tempelInput');
    
    if(tempelBtn) {
        tempelBtn.onclick = () => {
            const rawText = tempelInput.value;
            if(rawText.trim()) {
                // Simpan nilai input ke localStorage agar tidak hilang
                localStorage.setItem('tempel_input_value', rawText);
                prosesTempelData(rawText);
                // Jangan kosongkan input, biarkan user lihat data yang sudah ditambahkan
                toast("✅ Data berhasil ditambahkan! Kolom input tetap terisi.");
            } else {
                toast("⚠️ Masukkan data terlebih dahulu!");
            }
        };
    }
    
    // Event untuk tombol reset input
    const resetBtn = document.getElementById('resetInputBtn');
    if(resetBtn) {
        resetBtn.onclick = () => {
            if(tempelInput) {
                tempelInput.value = '';
                localStorage.removeItem('tempel_input_value');
                toast("🗑️ Kolom input telah dikosongkan!");
            }
        };
    }
    
    // Simpan perubahan nilai input ke localStorage saat diketik
    if(tempelInput) {
        tempelInput.addEventListener('input', function() {
            localStorage.setItem('tempel_input_value', this.value);
        });
    }
    
    // Event untuk tombol edit
    document.querySelectorAll('.edit-data-btn').forEach(btn => {
        btn.onclick = () => {
            const idx = parseInt(btn.getAttribute('data-index'));
            const item = dataBank[idx];
            document.getElementById('editBank').value = item.bank;
            document.getElementById('editId').value = item.id;
            document.getElementById('editNama').value = item.nama;
            document.getElementById('editNoRek').value = item.norek;

        };
    });
    
    // Event untuk tombol hapus (langsung tanpa konfirmasi)
    document.querySelectorAll('.delete-data-btn').forEach(btn => {
        btn.onclick = () => {
            const idx = parseInt(btn.getAttribute('data-index'));
            deleteDataBank(idx);
        };
    });
}

// INIT
document.addEventListener('DOMContentLoaded', () => {
    const select = document.getElementById('marketSelect');
    PASARAN.forEach(p => { let opt = document.createElement('option'); opt.value = p; opt.textContent = p; select.appendChild(opt); });
    select.onchange = function() { if(select.value && !isOnStickyPage && !isOnShortcutPage) { document.getElementById('searchInput').value = select.value; cariPasaranForce(select.value, false); } };
    document.getElementById('searchInput').oninput = function() { if(!isOnStickyPage && !isOnShortcutPage) cariPasaranForce(this.value.trim(), false); };
    document.getElementById('showAllBtn').onclick = () => { if(!isOnStickyPage && !isOnShortcutPage) { document.getElementById('searchInput').value = ''; select.value = ''; tampilkanSemua(false); } };
    document.getElementById('copyAllBtn').onclick = () => { if(!isOnStickyPage && !isOnShortcutPage) { let all = ''; for(let p of PASARAN) all += formatTeks(p) + '\n\n'; copyText(all, 'Semua 53 pasaran disalin!'); } };
    document.getElementById('stickyNoteBtn').onclick = () => { renderStickyPage(); };
    document.getElementById('shortcutBtn').onclick = () => { renderShortcutPage(); };
    document.getElementById('closeModalBtn').onclick = closeModal;
    window.onclick = (e) => { 
        if(e.target === modal) closeModal();
        if(e.target === document.getElementById('editDataModal')) document.getElementById('editDataModal').style.display = 'none';
    };
    setInterval(() => { document.getElementById('dateTime').innerHTML = getTanggal() + ' | ' + new Date().toLocaleTimeString(); }, 1000);
    updateCountdown(); setInterval(updateCountdown, 1000);
    tampilkanSemua(false);
    loadStickyNotes();
    loadDataBank();
});
